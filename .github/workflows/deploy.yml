name: Deploy to Polkadot

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip-cache:
        description: "Skip deployment cache and force redeploy"
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: game-webview-build
          path: dist
          retention-days: 1

  # PR previews deploy to previewnet only (env: preview).
  deploy-preview:
    needs: build
    name: Deploy Preview
    if: github.event_name == 'pull_request'
    uses: paritytech/bulletin-deploy/.github/workflows/deploy.yml@main
    with:
      artifact-name: game-webview-build
      dotns-domain: game-webview-pr${{ github.event.pull_request.number }}-preview00.dot
      comment-on-pr: true
      env: preview
      gateway: dot.li
      skip-cache: true
      max-retries: 10
      bulletin-deploy-version: "0.7.30-rc.0"
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

  # Production (push to main / manual) publishes game-webview.dot to BOTH
  # networks: previewnet (env: preview) and paseo-next-v2. Each matrix leg
  # is an independent reusable-workflow call; fail-fast: false so one
  # network's failure doesn't cancel the other.
  #
  # skip-cache: true is REQUIRED here. The reusable workflow keys its
  # deploy cache on the build-content hash only (no env/network), so with
  # caching on, whichever leg finishes first would populate the cache and
  # the other network's leg would cache-hit and SKIP its deploy entirely —
  # never publishing to that network. Forcing skip-cache makes both legs
  # always deploy. (Tradeoff: every push to main redeploys both networks
  # even when the build content is unchanged. The workflow_dispatch
  # skip-cache input no longer affects production for this reason.)
  deploy-production:
    needs: build
    name: Deploy Production (${{ matrix.env }})
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: preview
            gateway: dot.li
          - env: paseo-next-v2
            gateway: paseo.li
    uses: paritytech/bulletin-deploy/.github/workflows/deploy.yml@main
    with:
      artifact-name: game-webview-build
      dotns-domain: game-webview.dot
      env: ${{ matrix.env }}
      gateway: ${{ matrix.gateway }}
      skip-cache: true
      max-retries: 10
      bulletin-deploy-version: "0.7.30-rc.0"
    secrets:
      mnemonic: ${{ secrets.DOTNS_MNEMONIC }}

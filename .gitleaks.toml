# gitleaks configuration for game-results
#
# Extends the default gitleaks ruleset and allowlists one file: the attestation
# CID map. Its values are IPFS CIDv1 content identifiers (e.g.
# "bafk2bzace...") — public, content-addressed hashes, NOT secrets. Their high
# entropy trips gitleaks' generic-api-key rule, so they are allowlisted here.
# Everything else is scanned normally.

title = "game-results"

[extend]
useDefault = true

[[allowlists]]
description = "IPFS CIDs in the attestation map are public content addresses, not secrets"
paths = [
  '''src/attestations/cid_map\.json''',
]
